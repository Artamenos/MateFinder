services:
  postgres:
    image: postgres:16-alpine
    container_name: matefinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: matefinder
      POSTGRES_USER: matefinder
      POSTGRES_PASSWORD: matefinder_password
    ports:
      - "5432:5432"
    volumes:
      - matefinder_postgres_data:/var/lib/postgresql/data

volumes:
  matefinder_postgres_data:
